[capture]
standby_sec = 2
interval_sec = 2
total_shots = 1
region = 471,226,995,802

[output]
file_path = output.md
encoding = utf-8

[button]
next_x = 1437
next_y = 927
next_label = 次の問題へ
next_template = screenshots\btn_next.png
search_region_ratio = 0.4
auto_click = false

[batch]
batch_size = 15
screenshots_dir = screenshots
output_dir = output_ocr

[vision]
enabled = true
backend = vertex_ai
key_file = CloudVisonViewer.json
filter_texts = 次の問題へ,前の問題へ,解答する,確認画面へ,もどる,解答一覧,試験終了, すべての問題を確認する, ©2026JapanDeepLearningAssociation, 解答を確認する

[vertexai]
project_id = feednotebooklm
model = google/gemini-2.5-flash-lite
fallback_model = google/gemini-2.5-flash
regions = us-central1, europe-west4, asia-northeast1, asia-southeast1

[slide_designer]
model = google/gemini-2.5-flash-lite
fallback_model = google/gemini-2.5-flash
regions = us-central1, europe-west4, asia-northeast1, asia-southeast1

[skill]
auto_invoke = false

