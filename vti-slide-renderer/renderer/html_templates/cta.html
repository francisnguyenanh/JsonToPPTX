<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: "Calibri", "Noto Sans", "Arial", sans-serif;
    position: relative;
    background: {{ bg_gradient }};
  }

  /* ── Decorative corner circles ── */
  /* Top-right (400pt ≈ 533px): dec_x = SLIDE_W - dec_sz//2 = 1013px */
  .decor-tr {
    position: absolute;
    top: -133px;
    right: -133px;
    width: 533px;
    height: 533px;
    border-radius: 50%;
    background: {{ decor_color_a }};
    pointer-events: none;
  }

  /* Bottom-left (293pt ≈ 391px): dec_x = -dec_sz2//3 ≈ -130px */
  .decor-bl {
    position: absolute;
    bottom: -195px;
    left: -130px;
    width: 391px;
    height: 391px;
    border-radius: 50%;
    background: {{ decor_color_b }};
    pointer-events: none;
  }

  /* ── Content zone (matches geometry CONTENT_X=27pt, CONTENT_W=1226pt) ── */
  .content {
    position: absolute;
    left: 36px;
    top: 0;
    right: 36px;
    bottom: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Heading (y=73pt ≈ 97px, h=73pt, 40pt bold) */
  .heading {
    font-size: 46px;
    font-weight: 700;
    color: {{ heading_color }};
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }

  /* Divider line */
  .divider {
    width: 100%;
    height: 1px;
    background: {{ divider_color }};
    margin-bottom: 32px;
  }

  /* Items grid — flex row, equal width columns */
  .items {
    display: flex;
    gap: 18px;
    align-items: flex-start;
  }

  .item {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Badge circle (24pt ≈ 32px diameter) */
  .badge {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  /* Item title (26pt bold) */
  .item-title {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 10px;
    word-break: break-word;
  }

  /* Item description (17pt) */
  .item-desc {
    font-size: 19px;
    font-weight: 400;
    line-height: 1.5;
    opacity: 0.92;
    word-break: break-word;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 10px;
    left: 0;
    width: 1280px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-left: 36px;
  }

  .footer-badge {
    width: 56px;
    height: 46px;
    background: #408DD6;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    flex-shrink: 0;
  }

  .footer-copy {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="decor-tr"></div>
  <div class="decor-bl"></div>

  <div class="content">
    <div class="heading">{{ heading }}</div>
    <div class="divider"></div>

    <div class="items">
      {% for item in items %}
      <div class="item">
        <div class="badge" style="background: {{ item.badge_color }}">{{ item.number }}</div>
        <div class="item-title" style="color: {{ item.text_color }}">{{ item.title }}</div>
        <div class="item-desc"  style="color: {{ item.text_color }}">{{ item.description }}</div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="footer">
    <div class="footer-badge">{{ slide_number }}</div>
    <div class="footer-copy">Copyright &copy; 2026 VTI All rights reserved</div>
  </div>
</body>
</html>
