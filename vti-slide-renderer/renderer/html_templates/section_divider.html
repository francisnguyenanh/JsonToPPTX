<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: "Calibri", "Noto Sans", "Arial", sans-serif;
    position: relative;
    background: {{ bg_gradient }};
  }

  /* ── Left vertical bar ── */
  .left-bar {
    position: absolute;
    left: 0; top: 0;
    width: 15px;
    height: 720px;
    background: {{ left_bar_gradient }};
  }

  /* ── Top-right decorative circle (400pt ≈ 533px) ── */
  /* dec_x = SLIDE_W - dec_sz//2 ≈ 1280 - 267 = 1013px */
  .decor-circle {
    position: absolute;
    top: -133px;
    right: -133px;
    width: 533px;
    height: 533px;
    border-radius: 50%;
    background: {{ decor_color }};
    pointer-events: none;
  }

  /* ── Right card (320pt × 480pt) ──
     card_w = 320pt ≈ 427px
     card_h = 480pt ≈ 640px
     card_x = SLIDE_W - card_w - 53pt ≈ 1280 - 427 - 71 = 782px
     card_y = (720 - 640) / 2 = 40px */
  .right-card {
    position: absolute;
    left: 782px;
    top: 40px;
    width: 427px;
    height: 640px;
    background: {{ rc_gradient }};
    border-radius: 12px;
    border-top: 5px solid {{ rc_border_top }};
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  /* Subtle decor ellipse inside card */
  .right-card::after {
    content: "";
    position: absolute;
    bottom: -90px;
    right: -90px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: {{ rc_decor_color }};
  }

  /* ── Left content zone ──
     tx = 37pt ≈ 49px
     text_w = card_x - 80pt ≈ 782 - 107 = 675px (capped to readable width)
     vertically centered: cy = SLIDE_H//2 - 107pt ≈ 360 - 143 = 217px */
  .content {
    position: absolute;
    left: 49px;
    top: 0;
    width: 700px;
    height: 720px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 24px;
  }

  /* Section number (29pt ≈ 39px, muted) */
  .section-number {
    font-size: 34px;
    font-weight: 700;
    color: {{ section_number_color }};
    margin-bottom: 12px;
    min-height: 1px;
  }

  /* Section title (69pt Calibri bold, white) */
  .section-title {
    font-size: 78px;
    font-weight: 700;
    color: {{ section_title_color }};
    line-height: 1.08;
    margin-bottom: 20px;
    word-break: break-word;
  }

  /* Subtitle (17pt, muted blue) */
  .subtitle {
    font-size: 20px;
    font-weight: 400;
    color: {{ subtitle_color }};
    line-height: 1.5;
    min-height: 1px;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 10px;
    left: 0;
    width: 1280px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-left: 15px;
  }

  .footer-badge {
    width: 56px;
    height: 46px;
    background: #408DD6;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    flex-shrink: 0;
  }

  .footer-copy {
    font-size: 12px;
    color: #808080;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="left-bar"></div>
  <div class="decor-circle"></div>

  <div class="right-card"></div>

  <div class="content">
    {% if section_number %}<div class="section-number">{{ section_number }}</div>{% endif %}
    {% if section_title %}<div class="section-title">{{ section_title }}</div>{% endif %}
    {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  </div>

  <div class="footer">
    <div class="footer-badge">{{ slide_number }}</div>
    <div class="footer-copy">Copyright &copy; 2026 VTI All rights reserved</div>
  </div>
</body>
</html>
